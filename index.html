<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <h1 class="headerTitle">// calculator</h1>
        <p class="headerCredits">Made by 4NP</p>
    </header>

    <main class="main">
        <div class="calculator">
            <input type="text" readonly id="calculatorDisplay" class="calculatorDisplay">

            <div class="calculatorButtons">
                <button onclick="appendValue('7')" class="btn btnNumber">7</button>
                <button onclick="appendValue('8')" class="btn btnNumber">8</button>
                <button onclick="appendValue('9')" class="btn btnNumber">9</button>
                <button onclick="appendValue('/')" class="btn btnOperator">&divide;</button>

                <button onclick="appendValue('4')" class="btn btnNumber">4</button>
                <button onclick="appendValue('5')" class="btn btnNumber">5</button>
                <button onclick="appendValue('6')" class="btn btnNumber">6</button>
                <button onclick="appendValue('*')" class="btn btnOperator">&times;</button>

                <button onclick="appendValue('1')" class="btn btnNumber">1</button>
                <button onclick="appendValue('2')" class="btn btnNumber">2</button>
                <button onclick="appendValue('3')" class="btn btnNumber">3</button>
                <button onclick="appendValue('-')" class="btn btnOperator">-</button>

                <button onclick="resetDisplay()" class="btn btnNumber">C</button>
                <button onclick="appendValue('0')" class="btn btnNumber">0</button>
                <button onclick="appendValue('.')" class="btn btnNumber">.</button>
                <button onclick="appendValue('+')" class="btn btnOperator">+</button>
            </div>

            <button onclick="evaluateExpression()" class="btn btnEquals">=</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
